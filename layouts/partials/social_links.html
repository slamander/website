{{/* Renders social/profile icons for a person, using their `profiles` front matter field */}}
{{ with .Params.profiles }}
  <div style="display: flex; gap: 0.6rem; justify-content: center; margin-top: 0.5rem; flex-wrap: wrap;">
    {{ range . }}
      <a href="{{ .link }}" style="opacity: 0.75;" title="{{ .icon }}">
        {{ partial "functions/get_icon" (dict "name" .icon "attributes" "style=\"width:18px;height:18px;\"") }}
      </a>
    {{ end }}
  </div>
{{ end }}
